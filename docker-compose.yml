services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marulidi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-marulidi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marulidi_password}
    command: ["postgres", "-p", "${POSTGRES_PORT:-5123}"]
    ports:
      - "${POSTGRES_PORT:-5123}:${POSTGRES_PORT:-5123}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marulidi} -d ${POSTGRES_DB:-marulidi_bot} -p ${POSTGRES_PORT:-5123}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marulidi}:${POSTGRES_PASSWORD:-marulidi_password}@db:${POSTGRES_PORT:-5123}/${POSTGRES_DB:-marulidi_bot}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./guides:/app/guides:ro
    command: ["python", "-m", "bot"]

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marulidi}:${POSTGRES_PASSWORD:-marulidi_password}@db:${POSTGRES_PORT:-5123}/${POSTGRES_DB:-marulidi_bot}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMIN_PANEL_PORT:-8080}:8080"
    volumes:
      - ./guides:/app/guides
    command: ["uvicorn", "bot.admin_app:app", "--host", "0.0.0.0", "--port", "8080"]

volumes:
  pg_data:
